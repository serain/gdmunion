# News-article frames for the "Why We're Doing This" carousel on the homepage.
# `summary` is a short digest foregrounding Google's role; these mirror entries
# in the archive (data/archive.toml).
#
# Order here is a deliberate narrative arc, not chronological: Google deletes its
# own ban -> was warned and signed anyway -> the human cost -> the escalation.
#
# `focus` sets background-position for the slide (the scrim is heavy on the left
# and bottom, bright top-right — so bias the subject up and slightly right).
#
# NOTE: images below are interim best-fit reuses from the previous slate — they
# are NOT yet shot-matched to these four stories (esp. slide 1 and slide 4).
# New CC-licensed images still need sourcing. See git history for the originals.
#
# Image credits (all free to use):
#   gaza-censorship.jpg — Hla.bashbash, "A mural on one of the bombed buildings
#                         on Al Thawra Street", CC BY 4.0 (Wikimedia Commons)
#   nimbus-cloud.jpg    — PiDatacenters, "Racks Amravati Data Center",
#                         CC BY-SA 4.0 (Wikimedia Commons)
#   gaza-famine.jpg     — Hla.bashbash, "A bombed car and the remains of a
#                         destroyed building on Al Lababidi Street in the Gaza
#                         Strip", CC BY 4.0 (Wikimedia Commons)
#   ice-agents.jpg      — U.S. Immigration and Customs Enforcement (ERO officers,
#                         West Palm Beach, Feb 2025), public domain (Wikimedia)

[[article]]
image = "articles/nimbus-cloud.jpg"
focus = "center"
title = "Google Erased Its Own Ban on AI for Weapons and Surveillance"
summary = "Weeks into Trump's second term, Google deleted the promises it made in 2018 — after staff protests over a military drone contract — never to build AI for weapons, for surveillance that violates accepted norms, or for technology that causes overall harm. It didn't call it a reversal; it called it an 'update', leaving a one-line note: 'We've made updates to our AI Principles.'"
source = "WIRED"
date = "February 2025"

[[article]]
image = "articles/gaza-famine.jpg"
focus = "center 60%"
title = "Google's Own Lawyers Warned Its AI Could Enable Human Rights Abuses. It Signed Anyway."
summary = "Before signing a $1.2bn deal to supply the Israeli military with cloud and AI, Google's own lawyers and human-rights consultants warned the technology 'could be used for, or linked to, the facilitation of human rights violations', and advised it withhold machine-learning and AI tools from Israel's military. Google signed, refused to write its AI principles into the contract, and — its internal files show — kept no reliable way to monitor how the technology was used."
source = "The New York Times"
date = "December 2024"

[[article]]
image = "articles/gaza-censorship.jpg"
focus = "center 45%"
title = "Israel Used Google Photos to Build a Gaza 'Hit List'"
summary = "Israel ran a facial-recognition dragnet across Gaza, and an Israeli official told the New York Times that Google Photos' face-matching 'worked better' than purpose-built tools — helping assemble a 'hit list' of alleged October 7 participants. Thousands of Palestinians were detained, some tortured. Asked how this squared with its ban on using Photos to cause 'serious and immediate harm', Google declined to answer."
source = "The Intercept"
date = "April 2024"

[[article]]
image = "articles/ice-agents.jpg"
focus = "center 42%"
title = "Google Signed the Pentagon Clause a Rival Refused on Ethics Grounds"
summary = "The Pentagon announced deals with eight AI firms — Google among them — to build an 'AI-first fighting force', each agreeing to let the military deploy its models for 'any lawful use'. Rival lab Anthropic refused that clause, fearing its AI would be used for domestic mass surveillance or autonomous lethal weapons, and was branded a 'supply-chain risk' for it. Google signed."
source = "The Guardian"
date = "May 2026"
