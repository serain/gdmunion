# Precedent cards shown in the "Can We Negotiate On This?" section.
# Add a card by copying a [[precedent]] block. Images live in static/precedents/.

[[precedent]]
headline = "£80M pulled from Israeli bonds"
text = "In 2024, university staff pressured the USS, the UK's largest private pension fund, into divesting from Israeli bonds over human rights violations."
image = "precedents/divestment.jpg"

[[precedent]]
headline = "Phone lines to apartheid South Africa cut"
text = "In the 1980s, British Telecom employees refused to connect calls to apartheid South Africa, using their position on the network to apply direct pressure on the regime."
image = "precedents/apartheid.jpg"

[[precedent]]
headline = "Legal protection from AI replicas"
text = "In January 2025, UK actors voted 99.6% to refuse AI body scans on set, forcing film and TV producers to the table to negotiate protections for their likenesses."
image = "precedents/ai-performers.jpg"

[[precedent]]
headline = "Pinochet's warplanes left unserviced"
text = "In 1974, more than 3000 employees at the Rolls-Royce factory in Scotland refused to repair Chilean Air Force engines, helping ground Pinochet's air force for four years."
image = "precedents/arms.jpg"

[[precedent]]
headline = "Port automation banned to 2030"
text = "US dockworkers used a 2024 strike to ban automated cranes and driverless vehicles, shielding jobs from AI-led redundancy."
image = "precedents/ports.jpg"

[[precedent]]
headline = "No AI cloning without consent"
text = "Video-game performers struck major studios in 2024 to stop AI replicating voices and likenesses without consent or pay."
