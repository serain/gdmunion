# FAQ entries shown in the FAQ section.
# Add one by copying a [[faq]] block. Answers support Markdown.

[[faq]]
question = "What does statutory recognition mean for union members?"
answer = """
Statutory recognition gives GDM employees a legal framework to force negotiations on topics we care
about if Google refuses to recognise us voluntarily. By securing recognition, we gain formal rights
to collective bargaining, disclosure of internal company information, and mandatory negotiation and
consultation on major workplace changes.

For statutory recognition there is a minimum membership threshold (10% of the bargaining unit, which
we have passed) and all employees in the unit are called to vote. Even if you are not a union member,
you can still vote — your vote will be fully anonymous. A majority vote in favour is sufficient;
there is no minimum turnout threshold.
"""

[[faq]]
question = "How can we extend the collective agreement beyond pay / hours / holidays?"
answer = """
There is no restriction on topics we can discuss in collective bargaining — including business
practices, company priorities and governance. Pay, hours and holidays is the minimum legal scope,
but this isn't the focus of our campaign.

To broaden the scope we need to pressure Google using our industrial leverage: unions can use
actions short of a strike, campaigns, and ultimately strikes if the employer refuses.
**The stronger the union, the more effective the pressure.** Most often, a credible threat is all
it takes. Getting recognition is just the first step — then we work on extending the agreement.
"""

[[faq]]
question = "I don't want to be affected by decisions made by union members — what can I do?"
answer = """
Decisions that affect you are already made by a much smaller pool of management executives,
with no visibility or meaningful input from you: you were not consulted on the removal of the
autonomous weapons or mass surveillance pledges from the AI Principles, nor on safety risks from
contracts with significant human rights implications.

Collective decision-making adds democracy, not removes it. We will have a way to demand changes,
and the company will have to consult us before making major decisions. Surveys can be run among
all employees to better understand concerns. You will never be forced to engage or join a union.
"""

[[faq]]
question = "Have you tried going through the UK Googler Forums?"
answer = """
We have tried to open dialogue through the UK Googler Forums, but leadership declined to discuss
ethical matters through this forum. Other routes — petitions with broad support, letters, questions
at townhalls — have also been tried and ignored.
"""

[[faq]]
question = "What is \"union busting\"?"
answer = """
Let's ask Gemini!

![Gemini's response to "what is union busting?", listing common union-busting tactics](gemini-unionbusting.png)

The best way to counteract union busting:

- **Resist intimidation** by knowing your rights and UK law. Union activity is well protected in the UK.
- **Diversify your sources** — listen to different narratives and build your own informed opinion. Assume leadership have a bias in their comms about unions.
- **Talk with your colleagues** — learn about their experience and motivations directly from them.
"""

[[faq]]
question = "Why doesn't Google want us to form a union?"
answer = """
Together we can formally act as an employee-side counterweight to management's ability to exercise
unchecked authority. Management's self-interest is to prevent us from having this kind of power.
"""
